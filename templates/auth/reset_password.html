<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - IFRI MentorLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/reset.css">
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 col-lg-5">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary"><i class="bi bi-people-fill"></i> IFRI MentorLink</h2>
                <p class="text-muted">Récupération de votre compte étudiant</p>
            </div>

            <div class="card reset-card p-4">
                <h4 class="card-title mb-3 fw-semibold text-center">Mot de passe oublié ?</h4>
                <p class="text-muted text-center small mb-4">
                    Saisissez l'adresse email institutionnelle associée à votre compte. Nous vous enverrons un lien pour réinitialiser votre mot de passe.
                </p>
                
                <form action="#" method="POST">
                    
                    <div class="mb-4">
                        <label for="email" class="form-label">Adresse Email de l'IFRI</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="exemple@ifri.uac.bj">
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-reset fw-semibold text-white">Envoyer le lien de récupération</button>
                    </div>

                    <div class="text-center mt-4">
                        <a href="login.html" class="auth-link fw-semibold"><i class="bi bi-arrow-left"></i> Retour à la page de connexion</a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
