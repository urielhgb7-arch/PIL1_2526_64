<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFRI MentorLink - Plateforme de Mentorat</title>
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>

    <div class="landing-container">
        
        <header class="landing-header">
            <div class="logo-text">
                <span class="text-gradient">IFRI MentorLink</span>
            </div>
            <a href="pages/register.html" class="btn btn-secondary btn-sm">S'inscrire</a>
        </header>

        <section class="hero-section">
            <h1>L'entraide académique <br><span class="text-gradient">nouvelle génération</span></h1>
            <p>Connectez-vous avec des pairs experts, partagez vos connaissances et excellez ensemble. La plateforme de mentorat peer-to-peer de l'IFRI.</p>
            
            <div class="hero-cta-group">
                <a href="pages/register.html" class="btn btn-primary">Commencer maintenant →</a>
                <a href="pages/login.html" class="btn btn-secondary">Se connecter</a>
            </div>
        </section>

        <section class="matching-showcase-section">
            <div class="matching-vector-area">
                <svg viewBox="0 0 600 500" fill="none" xmlns="http://www.w3.org/2000/svg">
                    
                    <circle cx="300" cy="250" r="45" fill="#12141C" stroke="var(--indigo-primary)" stroke-width="3" class="node-you-circle"/>
                    <text x="300" y="255" fill="white" font-size="14" font-weight="750" text-anchor="middle">IFRI</text>

                    <g class="animate-bubble-1">
                        <line x1="300" y1="250" x2="120" y2="150" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        <line x1="300" y1="250" x2="210" y2="410" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        
                        <circle cx="120" cy="150" r="35" fill="#12141C" stroke="var(--mint-success)" stroke-width="2"/>
                        <text x="120" y="154" fill="white" font-size="12" font-weight="600" text-anchor="middle">GL</text>
                        
                        <circle cx="210" cy="410" r="32" fill="#12141C" stroke="var(--indigo-primary)" stroke-width="2"/>
                        <text x="210" y="414" fill="white" font-size="12" font-weight="600" text-anchor="middle">SI</text>
                    </g>

                    <g class="animate-bubble-2">
                        <line x1="300" y1="250" x2="480" y2="150" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        <line x1="300" y1="250" x2="390" y2="410" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        
                        <circle cx="480" cy="150" r="35" fill="#12141C" stroke="var(--amber-warning)" stroke-width="2"/>
                        <text x="480" y="154" fill="white" font-size="12" font-weight="600" text-anchor="middle">IA</text>
                        
                        <circle cx="390" cy="410" r="32" fill="#12141C" stroke="var(--indigo-primary)" stroke-width="2"/>
                        <text x="390" y="414" fill="white" font-size="11" font-weight="600" text-anchor="middle">SIRI</text>
                    </g>

                    <g class="animate-bubble-3">
                        <line x1="300" y1="250" x2="120" y2="350" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        
                        <circle cx="120" cy="350" r="35" fill="#12141C" stroke="var(--mint-success)" stroke-width="2"/>
                        <text x="120" y="354" fill="white" font-size="12" font-weight="600" text-anchor="middle">IM</text>
                    </g>

                    <g class="animate-bubble-4">
                        <line x1="300" y1="250" x2="480" y2="350" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
                        
                        <circle cx="480" cy="350" r="35" fill="#12141C" stroke="var(--coral-red)" stroke-width="2"/>
                        <text x="480" y="354" fill="white" font-size="11" font-weight="600" text-anchor="middle">SE&IoT</text>
                    </g>

                </svg>
            </div>
        </section>

    </div>

</body>
</html>
