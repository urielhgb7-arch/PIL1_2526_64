      <a href="matching.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-muted hover:bg-popover hover:text-white transition-colors">

        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        <span>Messages</span>
      </a>
      <a href="requests.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-primary text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span>Demandes</span>
      </a>
      <a href="settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-muted hover:bg-popover hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>

      </a>

    <div class="p-4 border-t border-border">
      <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-destructive hover:bg-destructive/10 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>

  <!-- ═══════════════ MAIN CONTENT ═══════════════ -->
  <div class="lg:ml-64 pb-24 lg:pb-8">

    <!-- Top Bar -->
    <div class="sticky top-0 z-40 bg-background/80 backdrop-blur-sm border-b border-border p-4">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Demandes</h1>
        <div class="flex items-center gap-3">
          <a href="notifications.html" class="site-bell" aria-label="Notifications">
            <span class="ti ti-bell"></span>
            <span class="dot" id="siteBellDot"></span>
          </a>
          <button onclick="openNewDemandModal()"
            class="flex items-center gap-2 px-5 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors font-medium text-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nouvelle demande
          </button>
        </div>
      </div>
    </div>

    <div class="p-4 lg:p-8 space-y-8">

      <!-- Toast notification -->
      <div id="toast" class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium transition-all"></div>

      <!-- ── Tabs ── -->
      <div class="flex gap-1 bg-card border border-border rounded-xl p-1 w-fit">
        <button id="tab-received" onclick="switchTab('received')"
          class="tab-btn px-5 py-2 rounded-lg text-sm font-medium transition-colors bg-primary text-white">
          Reçues
          <span id="badge-received" class="ml-2 px-2 py-0.5 bg-white/20 rounded-full text-xs">0</span>
        </button>
        <button id="tab-sent" onclick="switchTab('sent')"
          class="tab-btn px-5 py-2 rounded-lg text-sm font-medium transition-colors text-muted hover:text-white">
          Envoyées
          <span id="badge-sent" class="ml-2 px-2 py-0.5 bg-white/10 rounded-full text-xs">0</span>
        </button>
      </div>

      <!-- ── SECTION REÇUES ── -->
      <div id="section-received">
        <div id="received-loading" class="flex items-center gap-3 py-12 text-muted text-sm">
          <div class="w-5 h-5 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
          Chargement des demandes reçues…
        </div>
        <div id="received-empty" class="hidden flex-col items-center justify-center py-16 text-center">
          <div class="w-16 h-16 rounded-full bg-card border border-border flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
            </svg>
          </div>
          <p class="text-muted">Aucune demande reçue pour l'instant.</p>
        </div>
        <div id="received-list" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
      </div>

      <!-- ── SECTION ENVOYÉES ── -->
      <div id="section-sent" class="hidden">
        <div id="sent-loading" class="flex items-center gap-3 py-12 text-muted text-sm">
          <div class="w-5 h-5 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
          Chargement des demandes envoyées…
        </div>
        <div id="sent-empty" class="hidden flex-col items-center justify-center py-16 text-center">
          <div class="w-16 h-16 rounded-full bg-card border border-border flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">

            </svg>
          </div>
          <p class="text-muted">Vous n'avez encore envoyé aucune demande.</p>
          <button onclick="openNewDemandModal()" class="mt-4 px-5 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">
            Créer une demande
          </button>
        </div>
        <div id="sent-list" class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
      </div>

    </div>

        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>

        </svg>

      <a href="messages.html" class="flex flex-col items-center gap-1 p-2 text-muted">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        <span class="text-xs">Messages</span>
      </a>
      <a href="requests.html" class="flex flex-col items-center gap-1 p-2 text-primary">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span class="text-xs">Demandes</span>
      </a>

  <!-- ═══════════════ MODAL NOUVELLE DEMANDE ═══════════════ -->
  <div id="modal-new-demand" class="hidden fixed inset-0 bg-background/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-card border border-border rounded-2xl p-7 w-full max-w-md shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold">Nouvelle demande d'aide</h2>
        <button title="Fermer" onclick="closeNewDemandModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-muted hover:text-white hover:bg-popover transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <div id="modal-error" class="hidden mb-4 p-3 bg-destructive/10 border border-destructive rounded-lg">
        <p class="text-destructive text-sm" id="modal-error-text"></p>
      </div>

      <form id="new-demand-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Matière concernée</label>
          <select title="Matière concernée" id="demand-matiere" required
            class="w-full px-4 py-3 bg-input rounded-lg border border-border focus:outline-none focus:ring-2 focus:ring-primary text-sm">
            <option value="">Sélectionnez une matière…</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Description de la demande</label>
          <textarea title="Description de la demande" id="demand-desc" rows="3" required placeholder="Décrivez précisément ce dont vous avez besoin…"
            class="w-full px-4 py-3 bg-input rounded-lg border border-border focus:outline-none focus:ring-2 focus:ring-primary text-sm resize-none placeholder:text-muted"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Niveau d'urgence</label>
          <div class="grid grid-cols-4 gap-2">
            <label class="urgency-option cursor-pointer">
              <input type="radio" name="urgency" value="Low" class="sr-only" />
              <div class="px-3 py-2 rounded-lg border border-border bg-input text-center text-xs font-medium text-muted hover:border-success/50 transition-colors peer-checked:bg-success/10 peer-checked:border-success peer-checked:text-success urgency-label">Low</div>
            </label>
            <label class="urgency-option cursor-pointer">
              <input type="radio" name="urgency" value="Medium" class="sr-only" checked />
              <div class="px-3 py-2 rounded-lg border border-primary bg-primary/10 text-center text-xs font-medium text-primary transition-colors urgency-label">Medium</div>
            </label>
            <label class="urgency-option cursor-pointer">
              <input type="radio" name="urgency" value="High" class="sr-only" />
              <div class="px-3 py-2 rounded-lg border border-border bg-input text-center text-xs font-medium text-muted hover:border-warning/50 transition-colors urgency-label">High</div>
            </label>
            <label class="urgency-option cursor-pointer">
              <input type="radio" name="urgency" value="Urgent" class="sr-only" />
              <div class="px-3 py-2 rounded-lg border border-border bg-input text-center text-xs font-medium text-muted hover:border-destructive/50 transition-colors urgency-label">Urgent</div>
            </label>
          </div>
        </div>

        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeNewDemandModal()"
            class="flex-1 py-2.5 bg-popover border border-border text-white rounded-lg hover:bg-popover/80 transition-colors text-sm">
            Annuler
          </button>
          <button type="submit" id="demand-submit-btn"
            class="flex-1 py-2.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium flex items-center justify-center gap-2">
            Envoyer la demande
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════════ MODAL CONFIRM ACCEPT/REJECT ═══════════════ -->
  <div id="modal-confirm" class="hidden fixed inset-0 bg-background/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-card border border-border rounded-2xl p-7 w-full max-w-sm shadow-2xl text-center">
      <div id="confirm-icon" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4"></div>
      <h3 id="confirm-title" class="text-lg font-semibold mb-2"></h3>
      <p id="confirm-desc"  class="text-muted text-sm mb-6"></p>
      <div class="flex gap-3">
        <button onclick="closeConfirm()" class="flex-1 py-2.5 bg-popover border border-border rounded-lg text-sm hover:bg-popover/80 transition-colors">Annuler</button>
        <button title="Confirmer" id="confirm-action-btn" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center justify-center gap-2"></button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="script.js"></script>
  <script>
    checkAuth();

    /* ─── State ─── */
    let matieresCache = [];
    let currentTab    = 'received';
    let pendingAction = null;   // { type: 'accept'|'reject'|'delete', id }

    /* ─── Toast ─── */
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-2xl text-sm font-medium transition-all ${
        type === 'success' ? 'bg-success text-black' : 'bg-destructive text-white'
      }`;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    /* ─── Tabs ─── */
    function switchTab(tab) {
      currentTab = tab;
      ['received','sent'].forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        const sec = document.getElementById(`section-${t}`);
        if (t === tab) {
          btn.className = 'tab-btn px-5 py-2 rounded-lg text-sm font-medium transition-colors bg-primary text-white';
          sec.classList.remove('hidden');
        } else {
          btn.className = 'tab-btn px-5 py-2 rounded-lg text-sm font-medium transition-colors text-muted hover:text-white';
          sec.classList.add('hidden');
        }
      });
    }

    /* ─── Badge helpers ─── */
    function urgencyColor(u) {
      return { Low:'text-success bg-success/10 border-success/30', Medium:'text-primary bg-primary/10 border-primary/30', High:'text-warning bg-warning/10 border-warning/30', Urgent:'text-destructive bg-destructive/10 border-destructive/30' }[u] || 'text-muted bg-muted/10 border-border';
    }
    function statusBadge(s) {
      const map = { pending:'bg-warning/10 text-warning border-warning/30 Envoyée', accepted:'bg-success/10 text-success border-success/30 Acceptée', rejected:'bg-destructive/10 text-destructive border-destructive/30 Refusée' };
      const v = map[s] || 'bg-muted/10 text-muted border-border En attente';
      const [cls, lbl] = v.split(' ');
      return `<span class="px-2 py-0.5 rounded-full border text-xs ${cls} ${lbl === 'En' ? 'bg-muted/10 text-muted border-border' : ''}">${lbl || s}</span>`;
    }
    function avatarInitials(name = '') {
      return name.split(' ').map(w => w[0] || '').slice(0,2).join('').toUpperCase();
    }

    /* ─── Render cards ─── */
    function renderReceivedCard(req) {
      const card = document.createElement('div');
      card.className = 'bg-card border border-border rounded-xl p-5 flex flex-col gap-4 hover:border-primary/30 transition-colors';
      const name    = req.demandeur?.nom_complet || req.demandeur?.email || 'Étudiant';
      const level   = req.demandeur?.niveau ? `· ${req.demandeur.niveau}` : '';
      const dept    = req.demandeur?.departement ? `${req.demandeur.departement} ${level}` : level.replace('· ','');
      const matiere = req.matiere?.nom || req.matiere?.name || req.sujet || 'Matière inconnue';
      const desc    = req.description || req.message || '';
      const urgency = req.urgence || req.priority || 'Medium';
      const status  = req.statut || req.status || 'pending';
      const id      = req.id;

      card.innerHTML = `
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0">
              <span class="text-sm font-bold text-primary">${avatarInitials(name)}</span>
            </div>
            <div>
              <p class="font-semibold text-sm">${name}</p>
              <p class="text-xs text-muted">${dept}</p>
            </div>
          </div>
          <span class="px-2 py-0.5 rounded-full border text-xs ${urgencyColor(urgency)}">${urgency}</span>
        </div>
        <div>
          <p class="text-xs text-muted mb-1">Matière</p>
          <p class="text-sm font-medium">${matiere}</p>
        </div>
        ${desc ? `<p class="text-sm text-muted line-clamp-2">${desc}</p>` : ''}
        ${status !== 'pending' ? `<div class="pt-1">${statusBadge(status)}</div>` : `
        <div class="flex gap-2 pt-1">
          <button onclick="triggerConfirm('reject',${id})"
            class="flex-1 py-2 rounded-lg border border-destructive/40 text-destructive text-sm hover:bg-destructive/10 transition-colors font-medium">
            Refuser
          </button>
          <button onclick="triggerConfirm('accept',${id})"
            class="flex-1 py-2 rounded-lg bg-success text-black text-sm hover:bg-success/90 transition-colors font-medium">
            Accepter
          </button>
        </div>`}
      `;
      return card;
    }

    function renderSentCard(req) {
      const card = document.createElement('div');
      card.className = 'bg-card border border-border rounded-xl p-5 flex flex-col gap-4 hover:border-primary/30 transition-colors';
      const matiere = req.matiere?.nom || req.matiere?.name || req.sujet || 'Matière inconnue';
      const desc    = req.description || req.message || '';
      const urgency = req.urgence || req.priority || 'Medium';
      const status  = req.statut || req.status || 'pending';
      const id      = req.id;
      const dest    = req.destinataire?.nom_complet || req.destinataire?.email || '';

      card.innerHTML = `
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="font-semibold text-sm">${matiere}</p>
            ${dest ? `<p class="text-xs text-muted mt-0.5">Envoyée à ${dest}</p>` : ''}
          </div>
          <span class="px-2 py-0.5 rounded-full border text-xs ${urgencyColor(urgency)} flex-shrink-0">${urgency}</span>
        </div>
        ${desc ? `<p class="text-sm text-muted line-clamp-2">${desc}</p>` : ''}
        <div class="flex items-center justify-between pt-1">
          <div>${statusBadge(status)}</div>
          ${status === 'pending' ? `
          <button onclick="triggerConfirm('delete',${id})"
            class="text-xs text-destructive hover:underline transition-colors">
            Annuler
          </button>` : ''}
        </div>
      `;
      return card;
    }

    /* ─── Load data ─── */
    async function loadReceived() {
      const loading = document.getElementById('received-loading');
      const empty   = document.getElementById('received-empty');
      const list    = document.getElementById('received-list');
      loading.classList.remove('hidden');
      empty.classList.add('hidden');
      list.classList.add('hidden');

      try {
        const data = await API.matching.getReceived();
        const items = Array.isArray(data) ? data : (data.demandes || data.matches || data.data || []);
        document.getElementById('badge-received').textContent = items.length;
        loading.classList.add('hidden');
        if (items.length === 0) { empty.classList.remove('hidden'); return; }
        list.innerHTML = '';
        items.forEach(r => list.appendChild(renderReceivedCard(r)));
        list.classList.remove('hidden');
      } catch {
        loading.classList.add('hidden');
        empty.classList.remove('hidden');
      }
    }

    async function loadSent() {
      const loading = document.getElementById('sent-loading');
      const empty   = document.getElementById('sent-empty');
      const list    = document.getElementById('sent-list');
      loading.classList.remove('hidden');
      empty.classList.add('hidden');
      list.classList.add('hidden');

      try {
        const data = await API.matching.getSent();
        const items = Array.isArray(data) ? data : (data.demandes || data.matches || data.data || []);
        document.getElementById('badge-sent').textContent = items.length;
        loading.classList.add('hidden');
        if (items.length === 0) { empty.classList.remove('hidden'); return; }
        list.innerHTML = '';
        items.forEach(r => list.appendChild(renderSentCard(r)));
        list.classList.remove('hidden');
      } catch {
        loading.classList.add('hidden');
        empty.classList.remove('hidden');
      }
    }

    /* ─── Matieres for modal ─── */
    async function loadMatieres() {
      try {
        const data = await API.matieres.getAll();
        matieresCache = Array.isArray(data) ? data : (data.matieres || data.data || []);
      } catch {
        matieresCache = [
          {id:1,nom:'Algorithmique'},{id:2,nom:'Base de données SQL'},{id:3,nom:'Réseaux'},
          {id:4,nom:'Web Development'},{id:5,nom:'Programmation Orientée Objet'},
          {id:6,nom:"Systèmes d'exploitation"},{id:7,nom:'Architecture des ordinateurs'},{id:8,nom:'Génie Logiciel'}
        ];
      }
      const sel = document.getElementById('demand-matiere');
      matieresCache.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.nom || m.name || m.libelle;
        sel.appendChild(opt);
      });
    }

    /* ─── New demand modal ─── */
    function openNewDemandModal() {
      document.getElementById('modal-new-demand').classList.remove('hidden');
      document.getElementById('modal-error').classList.add('hidden');
      document.getElementById('new-demand-form').reset();
      // re-apply default urgency style
      document.querySelectorAll('.urgency-option').forEach(opt => {
        const radio = opt.querySelector('input');
        const lbl   = opt.querySelector('.urgency-label');
        lbl.className = 'px-3 py-2 rounded-lg border border-border bg-input text-center text-xs font-medium text-muted transition-colors urgency-label';
        if (radio.value === 'Medium') {
          lbl.className = 'px-3 py-2 rounded-lg border border-primary bg-primary/10 text-center text-xs font-medium text-primary transition-colors urgency-label';
          radio.checked = true;
        }
      });
    }
    function closeNewDemandModal() {
      document.getElementById('modal-new-demand').classList.add('hidden');
    }

    // Urgency radio styling
    document.querySelectorAll('.urgency-option input[type=radio]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.urgency-option').forEach(opt => {
          const r = opt.querySelector('input');
          const l = opt.querySelector('.urgency-label');
          const colorMap = { Low:'border-success bg-success/10 text-success', Medium:'border-primary bg-primary/10 text-primary', High:'border-warning bg-warning/10 text-warning', Urgent:'border-destructive bg-destructive/10 text-destructive' };
          l.className = r.checked
            ? `px-3 py-2 rounded-lg border ${colorMap[r.value]} text-center text-xs font-medium transition-colors urgency-label`
            : 'px-3 py-2 rounded-lg border border-border bg-input text-center text-xs font-medium text-muted transition-colors urgency-label';
        });
      });
    });

    document.getElementById('new-demand-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const matiere_id  = document.getElementById('demand-matiere').value;
      const description = document.getElementById('demand-desc').value.trim();
      const urgency     = document.querySelector('input[name="urgency"]:checked')?.value || 'Medium';
      const errEl       = document.getElementById('modal-error');
      const errTxt      = document.getElementById('modal-error-text');
      const btn         = document.getElementById('demand-submit-btn');

      if (!matiere_id) { errTxt.textContent = 'Veuillez sélectionner une matière.'; errEl.classList.remove('hidden'); return; }

      btn.disabled = true;
      btn.innerHTML = '<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';

      try {
        await API.demands.create({ matiere_id: parseInt(matiere_id), description, urgence: urgency });
        closeNewDemandModal();
        showToast('Demande envoyée avec succès !');
        await loadSent();
        switchTab('sent');
      } catch (err) {
        errTxt.textContent = err.message || 'Erreur lors de l\'envoi.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Envoyer la demande';
      }
    });

    /* ─── Confirm modal ─── */
    function triggerConfirm(type, id) {
      pendingAction = { type, id };
      const modal   = document.getElementById('modal-confirm');
      const icon    = document.getElementById('confirm-icon');
      const title   = document.getElementById('confirm-title');
      const desc    = document.getElementById('confirm-desc');
      const actBtn  = document.getElementById('confirm-action-btn');

      if (type === 'accept') {
        icon.className  = 'w-14 h-14 rounded-full bg-success/20 flex items-center justify-center mx-auto mb-4';
        icon.innerHTML  = '<svg class="w-7 h-7 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
        title.textContent = 'Accepter la demande ?';
        desc.textContent  = 'Vous vous engagez à aider cet étudiant. Un chat sera ouvert.';
        actBtn.className  = 'flex-1 py-2.5 rounded-lg bg-success text-black text-sm font-medium transition-colors flex items-center justify-center gap-2';
        actBtn.textContent = 'Confirmer';
      } else if (type === 'reject') {
        icon.className  = 'w-14 h-14 rounded-full bg-destructive/20 flex items-center justify-center mx-auto mb-4';
        icon.innerHTML  = '<svg class="w-7 h-7 text-destructive" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
        title.textContent = 'Refuser la demande ?';
        desc.textContent  = 'L\'étudiant sera informé que vous n\'êtes pas disponible.';
        actBtn.className  = 'flex-1 py-2.5 rounded-lg bg-destructive text-white text-sm font-medium transition-colors flex items-center justify-center gap-2';
        actBtn.textContent = 'Refuser';
      } else {
        icon.className  = 'w-14 h-14 rounded-full bg-warning/20 flex items-center justify-center mx-auto mb-4';
        icon.innerHTML  = '<svg class="w-7 h-7 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>';
        title.textContent = 'Annuler la demande ?';
        desc.textContent  = 'Cette demande sera supprimée définitivement.';
        actBtn.className  = 'flex-1 py-2.5 rounded-lg bg-warning text-black text-sm font-medium transition-colors flex items-center justify-center gap-2';
        actBtn.textContent = 'Annuler la demande';
      }

      actBtn.onclick = executeAction;
      modal.classList.remove('hidden');
    }

    function closeConfirm() {
      document.getElementById('modal-confirm').classList.add('hidden');
      pendingAction = null;
    }

    async function executeAction() {
      if (!pendingAction) return;
      const { type, id } = pendingAction;
      const btn = document.getElementById('confirm-action-btn');
      btn.disabled = true;
      btn.innerHTML = '<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>';

      try {
        if (type === 'accept')  await API.matching.accept(id);
        if (type === 'reject')  await API.matching.reject(id);
        if (type === 'delete')  await API.demands.delete(id);

        closeConfirm();
        const msgs = { accept:'Demande acceptée !', reject:'Demande refusée.', delete:'Demande annulée.' };
        showToast(msgs[type], type === 'accept' ? 'success' : 'error');

        if (type === 'delete') loadSent(); else loadReceived();
      } catch (err) {
        closeConfirm();
        showToast(err.message || 'Une erreur est survenue.', 'error');
      }
    }

    /* ─── Init ─── */
    loadMatieres();
    loadReceived();
    loadSent();
  </script>
  <script src="../js/matieres-loader.js"></script>
  <script src="../js/notifications-badge.js"></script>
</body>
</html>
