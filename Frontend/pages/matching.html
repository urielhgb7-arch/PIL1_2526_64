<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IFRI MentorLink — Swipe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/matching.css">
  <script src="../js/api.js"></script>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <span class="brand">IFRI</span><span class="name"> MentorLink</span>
    </div>

    <nav class="sidebar-nav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </div>
    <div class="nav-item ">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Swipe
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Trouver
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Demandes
    </div>
    <div class="nav-item ">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Paramètres
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="nav-item nav-item-muted">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Déconnexion
    </div>
  </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <button class="notification-btn" aria-label="Notifications">
      <i class="ti ti-bell"></i>
    </button>

    <!-- CARD -->
    <div class="mentor-card pop-in" id="card">
      <div class="card-hero">
        <div class="match-badge" id="match-badge">98% Match</div>
        <div class="avatar" id="avatar">AD</div>
        <div class="mentor-name" id="mentor-name">Aïcha D.</div>
        <div class="mentor-role" id="mentor-role">GL · L3</div>
      </div>
      <div class="card-body">
        <div class="tags" id="tags">
          <span class="tag algo">Algorithmique</span>
          <span class="tag gl">GL</span>
          <span class="tag time">Mer. Après-midi</span>
        </div>
        <div class="about-label">À propos</div>
        <p class="about-text" id="about">
          Peut aider avec les algorithmes récursifs complexes, la programmation dynamique et les révisions d'examens.
        </p>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn-action pass" onclick="swipe('pass')" aria-label="Passer">
        <i class="ti ti-x"></i>
      </button>
      <button class="btn-action info" onclick="swipe('info')" aria-label="Détails">
        <i class="ti ti-info-circle"></i>
      </button>
      <button class="btn-action like" onclick="swipe('like')" aria-label="Aimer">
        <i class="ti ti-heart-filled"></i>
      </button>
    </div>
  </main>
<script src="../js/matching.js"></script>
  
</body>
</html>
