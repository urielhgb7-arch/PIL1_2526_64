<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - IFRI MentorLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/login.css">
</head>
<script src="../../js/api.js"></script>


<body>

<div class="container my-5">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-6 col-lg-5">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary"><i class="bi bi-people-fill"></i> IFRI MentorLink</h2>
                <p class="text-muted">Connectez-vous pour retrouver votre mentor ou mentoré</p>
            </div>

            <div class="card login-card p-4">
                <h4 class="card-title mb-4 fw-semibold text-center">Espace Connexion</h4>
                
                <form action="#" method="POST">
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Adresse Email de l'IFRI ou Téléphone</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="exemple@ifri.uac.bj ou +229...">
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label">Mot de passe</label>
                            <a href="reset_password.html" class="auth-link">Mot de passe oublié ?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe" name="remember_me">
                        <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.9rem;">Se souvenir de moi</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-login fw-semibold text-white">Se connecter</button>
                    </div>

                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted" style="font-size: 0.95rem;">Nouveau sur la plateforme ? <a href="register.html" class="auth-link fw-semibold">Créer un compte</a></p>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
        const result = await MentorLinkAPI.auth.login({
            email: username,
            password: password
        });

        localStorage.setItem(
            "mentorlink_token",
            result.token
        );

        alert("Connexion réussie !");
        
        // Redirection vers le tableau de bord
        window.location.href = "../dashboard.html";

    } catch(error) {
        alert(error.message);
    }
});
</script>
</body>
</html>
