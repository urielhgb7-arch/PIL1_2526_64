<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - IFRI MentorLink</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary"><i class="bi bi-people-fill"></i> IFRI MentorLink</h2>
                <p class="text-muted">Rejoignez la communauté de mentorat de l'IFRI</p>
            </div>

            <div class="card register-card p-4">
                <h4 class="card-title mb-4 fw-semibold text-center">Créer un compte</h4>
                
                <form action="#" method="POST">
                    
                    <h5 class="section-title">Informations personnelles</h5>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="lastname" class="form-label">Nom</label>
                            <input type="text" class="form-control" id="lastname" name="lastname" required placeholder="Ex: DOSSOU">
                        </div>
                        <div class="col-sm-6">
                            <label for="firstname" class="form-label">Prénom(s)</label>
                            <input type="text" class="form-control" id="firstname" name="firstname" required placeholder="Ex: Jean">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Adresse Email de l'IFRI</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="exemple@ifri.uac.bj">
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Numéro de Téléphone</label>
                        <div class="input-group">
                            <span class="input-group-text">+229</span>
                            <input type="tel" class="form-control" id="phone" name="phone" required placeholder="01XXXXXXXX">
                        </div>
                    </div>

                    <h5 class="section-title">Parcours Académique</h5>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="filiere" class="form-label">Filière</label>
                            <select class="form-select" id="filiere" name="filiere" required>
                                <option value="" selected disabled>Choisir...</option>
                                <option value="GL">Génie Logiciel (GL)</option>
                                <option value="SI">Sécurité Informatique (SI)</option>
                                <option value="IM">Internet et Multimédia (IM)</option>
                                <option value="IA">Intelligence Artificielle (IA)</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label for="level" class="form-label">Niveau d'études</label>
                            <select class="form-select" id="level" name="level" required>
                                <option value="" selected disabled>Choisir...</option>
                                <option value="L1">Licence 1</option>
                                <option value="L2">Licence 2</option>
                                <option value="L3">Licence 3</option>
                                <option value="M1">Master 1</option>
                                <option value="M2">Master 2</option>
                            </select>
                        </div>
                    </div>

                    <h5 class="section-title">Compétences & Besoins</h5>
                    
                    <div class="mb-3">
                        <label for="skills" class="form-label">Vos points forts (Mentorat fourni)</label>
                        <textarea class="form-control" id="skills" name="skills" rows="2" placeholder="Ex: Programmation Python, Algorithmique..."></textarea>
                        <div class="form-text">Matières dans lesquelles vous pouvez aider.</div>
                    </div>

                    <div class="mb-3">
                        <label for="needs" class="form-label">Vos lacunes (Mentorat recherché)</label>
                        <textarea class="form-control" id="needs" name="needs" rows="2" placeholder="Ex: Réseaux, Statistiques..."></textarea>
                        <div class="form-text">Matières dans lesquelles vous voulez être aidé.</div>
                    </div>

                    <h5 class="section-title">Sécurité</h5>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label for="password" class="form-label">Mot de passe</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="col-sm-6">
                            <label for="confirm_password" class="form-label">Confirmer</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-register fw-semibold text-white">S'inscrire</button>
                    </div>

                    <div class="text-center mt-3">
                        <p class="mb-0 text-muted">Vous avez déjà un compte ? <a href="login.html" class="auth-link">Connectez-vous</a></p>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/api.js"></script>

<script>
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;

    if (password !== confirmPassword) {
        alert("Les mots de passe ne correspondent pas.");
        return;
    }

   const userData = {
    nom: document.getElementById("lastname").value,
    prenom: document.getElementById("firstname").value,
    email: document.getElementById("email").value,
    telephone: document.getElementById("phone").value,
    filiere: document.getElementById("filiere").value,
    niveau: document.getElementById("level").value,
    bio: "",
    password: password
};
    try {
        await MentorLinkAPI.auth.register(userData);

        alert("Inscription réussie !");
        window.location.href = "login.html";

    } catch(error) {
        alert(error.message);
    }
});
</script>
</body>
</html>
