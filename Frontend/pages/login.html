<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - IFRI MentorLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans px-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                IFRI MentorLink
            </h1>
            <p class="text-slate-400 text-sm mt-2">Connectez-vous pour accéder au réseau de mentorat</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Adresse Email de l'IFRI</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="votre.nom@ifri.uac.bj"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="••••••••"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                >
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-slate-300 mb-1">Se connecter en tant que</label>
                <select 
                    id="role" 
                    name="role"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-300 text-sm"
                >
                    <option value="mentore">Mentoré (Besoin d'aide)</option>
                    <option value="mentor">Mentor (Envie d'aider)</option>
                </select>
            </div>

            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-500/20 active:scale-[0.98]"
            >
                Se connecter
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center text-sm text-slate-400">
            <p>Nouveau sur MentorLink ? 
                <a href="register.html" class="text-blue-400 hover:underline font-medium ml-1">Créer un compte</a>
            </p>
        </div>
    </div>

    <script>
    // 1. On écoute l'événement "submit" (quand l'utilisateur clique sur le bouton)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche la page de se recharger automatiquement

        // 2. Récupération des données saisies par l'utilisateur dans les inputs
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;

        // Préparation de l'objet à envoyer au serveur
        const data = { 
            email: email, 
            password: password,
            role: role
        };

        try {
            // 3. ENVOI DES DONNÉES (Le fetch) au serveur Back-End
            // Remplacer l'URL ci-dessous par la vraie URL que ton coéquipier Back-End te donnera
            const response = await fetch('https://ton-api-backend.render.com/api/login', {
                method: 'POST', // On utilise POST pour envoyer des données de manière sécurisée
                headers: {
                    'Content-Type': 'application/json' // On indique qu'on envoie du texte au format JSON
                },
                body: JSON.stringify(data) // On transforme l'objet JavaScript en texte JSON
            });

            // 4. RÉCEPTION DE LA RÉPONSE DU SERVEUR
            const result = await response.json(); // Le serveur répond souvent un message en JSON

            if (response.ok) {
                // Si la connexion réussit (Statut HTTP 200)
                alert("Connexion réussie !");
                console.log("Token ou données reçues :", result);
                
                // Exemple : Rediriger l'utilisateur vers son tableau de bord (dashboard)
                // window.location.href = "dashboard.html";
            } else {
                // Si le serveur refuse (Ex: mauvais mot de passe, statut 401)
                alert("Erreur de connexion : " + (result.message || "Identifiants incorrects"));
            }

        } catch (error) {
            // Si le serveur est en panne ou que la connexion internet a échoué
            console.error("Erreur réseau :", error);
            alert("Impossible de joindre le serveur. Vérifiez votre connexion.");
        }
    });
</script>
</body>
</html>
