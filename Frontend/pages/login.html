<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - IFRI MentorLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans px-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                IFRI MentorLink
            </h1>
            <p class="text-slate-400 text-sm mt-2">Connectez-vous pour accéder au réseau de mentorat</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="error-banner hidden text-red-400 text-sm bg-red-950/50 p-3 rounded-xl border border-red-800" id="errorBanner"></div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Adresse Email de l'IFRI</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="votre.nom@ifri.uac.bj"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Mot de passe</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="••••••••"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                >
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-slate-300 mb-1">Se connecter en tant que</label>
                <select 
                    id="role" 
                    name="role"
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-300 text-sm"
                >
                    <option value="mentore">Mentoré (Besoin d'aide)</option>
                    <option value="mentor">Mentor (Envie d'aider)</option>
                </select>
            </div>

            <button 
                type="submit" 
                id="submitBtn"
                class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-500/20 active:scale-[0.98] flex justify-center items-center gap-2"
            >
                <span>Se connecter</span>
            </button>
            <button type="button" class="text-sm text-primary hover:underline"><a href="forgot-pw.html">Mot de passe oublié?</a></button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center text-sm text-slate-400">
            <p>Nouveau sur MentorLink ? 
                <a href="register.html" class="text-blue-400 hover:underline font-medium ml-1">Créer un compte</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorBanner = document.getElementById('errorBanner');
        const submitBtn   = document.getElementById('submitBtn');

        errorBanner.classList.add('hidden');
        errorBanner.textContent = "";

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const role     = document.getElementById('role').value;

        try {
            submitBtn.disabled = true;
            submitBtn.textContent = "Vérification...";

            // ✅ On utilise api.js au lieu d'un fetch manuel
            const result = await API.auth.login({ email, password, role });

            // Sauvegarde token + user (clés cohérentes avec api.js)
            localStorage.setItem('mentorlink_token', result.token);
            localStorage.setItem('mentorlink_user', JSON.stringify(result.user));

            // Redirection selon onboarding
            if (result.user?.isOnboarded === false) {
                window.location.href = "onboarding.html";
            } else {
                window.location.href = "dashboard.html";
            }

        } catch (err) {
            errorBanner.textContent = err.message || "Identifiants ou rôle incorrects.";
            errorBanner.classList.remove('hidden');

        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = "<span>Se connecter</span>";
        }
    });
</script>
<script src="../js/matieres-loader.js"></script>
<script src="../js/notifications-badge.js"></script>
</body>
</html>
