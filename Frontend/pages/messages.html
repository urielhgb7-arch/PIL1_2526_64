<script src="../js/bundle.js"></script>
<script>
checkAuth();

let currentConvId = null;
let currentUserId = null;

// ── Load current user id ──────────────────────────────────────────
async function getCurrentUserId() {
  if (currentUserId) return currentUserId;
  try {
    const u = JSON.parse(localStorage.getItem('mentorlink_user'));
    if (u && u.id) { currentUserId = u.id; return u.id; }
  } catch {}
  try {
    const d = await API.profile.getMe();
    const p = d.profile || d;
    currentUserId = p.user_id || p.id;
    return currentUserId;
  } catch { return null; }
}

// ── Load conversations ────────────────────────────────────────────
async function loadConversations() {
  const el = document.getElementById('conv-list');
  try {
    const data = await API.messages.getConversations();
    const convs = Array.isArray(data) ? data : (data.conversations || data.data || []);
    if (convs.length === 0) {
      el.innerHTML = `<div class="flex flex-col items-center justify-center py-12 text-muted">
        <svg class="w-12 h-12 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <p class="text-sm">Aucune conversation</p>
        <p class="text-xs mt-1">Acceptez une demande pour commencer</p>
      </div>`;
      return;
    }
    el.innerHTML = convs.map(c => {
      const a = c.avec || {};
      const name = `${a.prenom || ''} ${a.nom || ''}`.trim() || 'Utilisateur';
      const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const cid = c.conversation_id || c.id;
      return `
        <div class="conv-item cursor-pointer px-4 py-3 hover:bg-popover transition-colors border-b border-border"
             onclick="selectConversation(${cid}, '${name.replace(/'/g, "\\'")}', '${initials}')">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center flex-shrink-0">
              <span class="text-sm font-bold text-primary">${initials}</span>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-medium text-sm truncate">${name}</p>
            </div>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = `<div class="text-sm text-destructive text-center py-8">Erreur de chargement</div>`;
  }
}

// ── Select conversation ───────────────────────────────────────────
async function selectConversation(convId, name, initials) {
  if (currentConvId === convId) return;
  currentConvId = convId;

  // Update header
  document.getElementById('chat-avatar').textContent = initials;
  document.getElementById('chat-name').textContent = name;

  // Show chat panel
  document.getElementById('chat-empty').classList.add('hidden');
  document.getElementById('chat-active').classList.remove('hidden');

  // On mobile, hide conv list
  if (window.innerWidth < 1024) {
    document.getElementById('conv-panel').classList.add('hidden');
  }

  // Highlight in list
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('bg-popover'));
  document.querySelectorAll('.conv-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(`selectConversation(${convId},`)) {
      el.classList.add('bg-popover');
    }
  });

  // Load messages
  await loadMessages(convId);
}

function closeChat() {
  currentConvId = null;
  document.getElementById('chat-empty').classList.remove('hidden');
  document.getElementById('chat-active').classList.add('hidden');
  document.getElementById('conv-panel').classList.remove('hidden');
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('bg-popover'));
}

// ── Load messages ─────────────────────────────────────────────────
async function loadMessages(convId) {
  const el = document.getElementById('messages-list');
  el.innerHTML = `<div class="flex items-center justify-center py-8">
    <div class="w-4 h-4 border-2 border-primary/30 border-t-primary rounded-full animate-spin"></div>
    <span class="text-muted text-sm ml-2">Chargement...</span>
  </div>`;

  try {
    const data = await API.messages.getHistory(convId);
    const msgs = data.messages || data;
    if (!Array.isArray(msgs) || msgs.length === 0) {
      el.innerHTML = `<div class="text-center text-muted text-sm py-8">Aucun message. Envoyez le premier message !</div>`;
      return;
    }
    const uid = await getCurrentUserId();
    el.innerHTML = msgs.map(m => {
      const isMine = m.sender_id === uid;
      const time = formatTime(m.date_envoi);
      return `
        <div class="flex ${isMine ? 'justify-end' : 'justify-start'}">
          <div class="max-w-[75%] lg:max-w-[60%] px-4 py-2.5 rounded-2xl text-sm ${
            isMine
              ? 'bg-primary text-white rounded-br-md'
              : 'bg-popover border border-border rounded-bl-md'
          }">
            <p class="whitespace-pre-wrap break-words">${escapeHtml(m.contenu || '')}</p>
            <p class="text-xs mt-1 ${isMine ? 'text-white/60' : 'text-muted'}">${time}</p>
          </div>
        </div>`;
    }).join('');
    el.scrollTop = el.scrollHeight;
  } catch (err) {
    el.innerHTML = `<div class="text-sm text-destructive text-center py-8">Erreur de chargement</div>`;
  }
}

// ── Send message ──────────────────────────────────────────────────
document.getElementById('msg-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!currentConvId) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  // Optimistic insert
  const el = document.getElementById('messages-list');
  const empty = el.querySelector('.text-center');
  if (empty) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend', `
    <div class="flex justify-end">
      <div class="max-w-[75%] lg:max-w-[60%] px-4 py-2.5 rounded-2xl text-sm bg-primary text-white rounded-br-md">
        <p class="whitespace-pre-wrap break-words">${escapeHtml(text)}</p>
        <p class="text-xs mt-1 text-white/60">À l'instant</p>
      </div>
    </div>`);
  el.scrollTop = el.scrollHeight;
  input.value = '';

  try {
    await API.messages.send(currentConvId, text);
  } catch (err) {
    console.warn('Send error', err);
  }
});

// ── Helpers ───────────────────────────────────────────────────────
function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'Hier';
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── Search filter ─────────────────────────────────────────────────
document.getElementById('conv-search')?.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.conv-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});

// ── Init ──────────────────────────────────────────────────────────
loadConversations();
</script>
