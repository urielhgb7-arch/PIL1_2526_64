<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grille de Disponibilités - MentorLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/disponibilites.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-4 py-10 font-sans">

    <div class="w-full max-w-4xl">

        <div class="mb-6">
            <h2 class="text-2xl font-bold text-white">Grille de disponibilités</h2>
            <p class="text-slate-400 text-sm mt-1">Sélectionnez vos créneaux horaires disponibles</p>
        </div>

        <!-- Boutons de sélection rapide -->
        <div class="flex gap-3 mb-6 flex-wrap">
            <button id="btnMatinees" class="quick-btn px-4 py-2 rounded-lg border border-slate-600 text-sm font-medium text-slate-300 hover:border-indigo-500 hover:text-white transition">
                Sélectionner toutes les matinées
            </button>
            <button id="btnApresMidis" class="quick-btn px-4 py-2 rounded-lg border border-slate-600 text-sm font-medium text-slate-300 hover:border-indigo-500 hover:text-white transition">
                Sélectionner toutes les après-midis
            </button>
            <button id="btnReset" class="quick-btn px-4 py-2 rounded-lg border border-red-800 text-sm font-medium text-red-400 hover:border-red-500 hover:text-red-300 transition ml-auto">
                Tout effacer
            </button>
        </div>

        <!-- Grille -->
        <div class="overflow-x-auto rounded-xl border border-slate-700">
            <table class="w-full border-collapse" id="gridTable">
                <thead>
                    <tr class="bg-slate-800">
                        <th class="px-4 py-3 text-left text-sm font-semibold text-slate-300 w-24 border-b border-slate-700">Horaires</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Lundi</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Mardi</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Mercredi</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Jeudi</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Vendredi</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Samedi</th>
                        <th class="px-2 py-3 text-center text-sm font-semibold text-slate-300 border-b border-slate-700">Dimanche</th>
                    </tr>
                </thead>
                <tbody id="gridBody">
                    <!-- Généré par JS -->
                </tbody>
            </table>
        </div>

        <!-- Compteur de créneaux -->
        <div class="mt-4 text-sm text-slate-400">
            <span id="compteur">0</span> créneau(x) sélectionné(s)
        </div>

        <!-- Navigation -->
        <div class="flex justify-between items-center mt-8">
            <button id="btnPrecedent" class="flex items-center gap-2 px-5 py-3 rounded-xl bg-slate-800 border border-slate-700 text-sm font-medium text-slate-300 hover:bg-slate-700 transition">
                ‹ Précédent
            </button>
            <button id="btnTerminer" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-semibold text-sm shadow-lg shadow-indigo-500/20 transition active:scale-[0.98]">
                Terminer ›
            </button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/disponibilites.js"></script>
</body>
</html>
