<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - IFRI MentorLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center font-sans px-4 py-8">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        
        <div class="mb-4">
            <a href="../index.html" class="text-xs text-slate-400 hover:text-blue-400 transition">← Retour à l'accueil</a>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                Rejoignez MentorLink
            </h1>
            <p class="text-slate-400 text-sm mt-2">Développez vos compétences grâce au mentorat peer-to-peer de l'IFRI.</p>
        </div>

        <form id="registerForm" autocomplete="off" class="space-y-5">
            <div class="error-banner hidden text-red-400 text-sm bg-red-950/50 p-3 rounded-xl border border-red-800" id="errorBanner"></div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="firstname" class="block text-sm font-medium text-slate-300 mb-1">Prénom</label>
                    <input 
                        type="text" 
                        id="firstname" 
                        placeholder="Jean" 
                        required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                    >
                </div>
                <div>
                    <label for="lastname" class="block text-sm font-medium text-slate-300 mb-1">Nom</label>
                    <input 
                        type="text" 
                        id="lastname" 
                        placeholder="HOUNDJI" 
                        required
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                    >
                </div>
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-slate-300 mb-1">Numéro de Téléphone (Unique)</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="+229 01XXXXXXXX" 
                    required
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                >
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Adresse E-mail</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="etudiant@ifri.uac.bj" 
                    required
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Mot de passe</label>
                <div class="relative flex items-center">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                        class="w-full px-4 py-3 pr-12 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-slate-200 placeholder-slate-500 text-sm"
                    >
                    <button type="button" class="absolute right-4 text-slate-400 hover:text-slate-200" id="togglePasswordBtn">👁️</button>
                </div>
            </div>

            <div class="flex items-start gap-3 pt-1">
                <input 
                    type="checkbox" 
                    id="isAvailableToHelp" 
                    checked
                    class="w-5 h-5 mt-0.5 bg-slate-900 border-slate-700 rounded text-blue-500 focus:ring-blue-500 accent-blue-500 transition cursor-pointer"
                >
                <label for="isAvailableToHelp" class="text-sm text-slate-300 cursor-pointer select-none">
                    Je souhaite être disponible pour aider d'autres étudiants (Mentor)
                </label>
            </div>

            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-500/20 active:scale-[0.98] flex justify-center items-center gap-2"
                id="submitBtn"
            >
                <span>Créer mon compte →</span>
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-700/50 text-center text-sm text-slate-400">
            <p>Vous avez déjà un compte ? 
                <a href="login.html" class="text-blue-400 hover:underline font-medium ml-1">Se connecter</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
<script>
    // 1. Toggle mot de passe
    const passwordInput    = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePasswordBtn');

    togglePasswordBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            togglePasswordBtn.textContent = '🙈';
        } else {
            passwordInput.type = 'password';
            togglePasswordBtn.textContent = '👁️';
        }
    });

    // 2. Soumission du formulaire (Même logique de liaison API et validations)
    const form = document.getElementById('registerForm');
    const emailInput = document.getElementById('email');
    const errorBanner = document.getElementById('errorBanner');
    const submitBtn = document.getElementById('submitBtn');

    function showError(message) {
        errorBanner.textContent = message;
        errorBanner.classList.remove('hidden');
    }

    function hideError() {
        errorBanner.classList.add('hidden');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        // Validate email
        if (!email.endsWith('@ifri.uac.bj') && !email.endsWith('@gmail.com')) {
            showError('Email invalide. Utilisez un email @ifri.uac.bj ou @gmail.com');
            return;
        }

        // Validate password strength
        if (password.length < 8) {
            showError('Le mot de passe doit contenir au moins 8 caractères');
            return;
        }

        // Loading state (Reproduction exacte du spinner blanc tournant)
        submitBtn.disabled = true;
        submitBtn.innerHTML = `
            <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            Création...
        `;

        // Simulate API call
        setTimeout(() => {
            localStorage.setItem('userEmail', email);
            localStorage.setItem('isAuthenticated', 'true');
            localStorage.removeItem('onboardingCompleted');
            
            // Récupération des informations complémentaires si besoin
            const userData = {
                firstname: document.getElementById('firstname').value.trim(),
                lastname:  document.getElementById('lastname').value.trim(),
                phone:     document.getElementById('phone').value.trim(),
                isAvailableToHelp: document.getElementById('isAvailableToHelp').checked
            };
            localStorage.setItem('mentorlink_user_info', JSON.stringify(userData));

            window.location.href = 'onboarding.html';
        }, 1500);
    });
</script>
</body>
</html>
