<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réinitialiser le mot de passe - IFRI MentorLink</title>
  <link rel="stylesheet" href="../css/tailwind.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-background text-foreground min-h-screen">
  <div class="min-h-screen flex">
    <div class="hidden lg:flex lg:w-1/2 bg-card border-r border-border items-center justify-center p-12 relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-success/5"></div>
      <div class="relative z-10 text-center text-white">
        <h1 class="text-4xl font-bold mb-4">Réinitialisation du mot de passe</h1>
        <p class="text-muted max-w-md mx-auto">Saisissez votre code de réinitialisation et votre nouveau mot de passe pour reprendre l’accès à votre compte.</p>
      </div>
    </div>

    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-md">
        <div class="bg-card rounded-xl p-8 border border-border">
          <div class="mb-8">
            <h1 class="text-2xl font-semibold mb-2">Réinitialiser le mot de passe</h1>
            <p class="text-muted">Entrez le token et choisissez un nouveau mot de passe.</p>
          </div>

          <div id="error-message" class="hidden mb-6 p-4 bg-destructive/10 border border-destructive rounded-lg">
            <p class="text-destructive text-sm" id="error-text"></p>
          </div>
          <div id="info-message" class="hidden mb-6 p-4 bg-success/10 border border-success rounded-lg">
            <p class="text-success text-sm" id="info-text"></p>
          </div>

          <form id="reset-form" class="space-y-5">
            <div>
              <label for="reset-token" class="block text-sm font-medium mb-2">Token de réinitialisation</label>
              <input id="reset-token" type="text" placeholder="Entrez le token reçu"
                class="w-full px-4 py-3 bg-input rounded-lg border border-border placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required />
            </div>

            <div>
              <label for="new-password" class="block text-sm font-medium mb-2">Nouveau mot de passe</label>
              <input id="new-password" type="password" placeholder="••••••••"
                class="w-full px-4 py-3 bg-input rounded-lg border border-border placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required />
            </div>

            <div>
              <label for="confirm-password" class="block text-sm font-medium mb-2">Confirmer le mot de passe</label>
              <input id="confirm-password" type="password" placeholder="Confirmez le mot de passe"
                class="w-full px-4 py-3 bg-input rounded-lg border border-border placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required />
            </div>

            <button type="submit" id="reset-btn" class="w-full py-3 bg-primary text-white font-medium rounded-lg hover:bg-primary/90 transition-colors">
              Réinitialiser le mot de passe
            </button>

            <div class="text-center pt-4 border-t border-border">
              <p class="text-sm text-muted">
                Vous avez déjà un compte?
                <a href="signin.html" class="text-primary font-medium hover:underline">Retour à la connexion</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/script.js"></script>
  <script>
    const form = document.getElementById('reset-form');
    const tokenInput = document.getElementById('reset-token');
    const passwordInput = document.getElementById('new-password');
    const confirmInput = document.getElementById('confirm-password');
    const errorMessage = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const infoMessage = document.getElementById('info-message');
    const infoText = document.getElementById('info-text');
    const resetBtn = document.getElementById('reset-btn');

    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.remove('hidden');
    }

    function hideError() {
      errorMessage.classList.add('hidden');
    }

    function showInfo(message) {
      infoText.textContent = message;
      infoMessage.classList.remove('hidden');
    }

    function hideInfo() {
      infoMessage.classList.add('hidden');
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name) || '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      const token = getQueryParam('token');
      if (token) {
        tokenInput.value = token;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      hideInfo();

      const token = tokenInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;

      if (!token) {
        showError('Le token est requis.');
        return;
      }
      if (password.length < 6) {
        showError('Le mot de passe doit contenir au moins 6 caractères.');
        return;
      }
      if (password !== confirm) {
        showError('Les mots de passe ne correspondent pas.');
        return;
      }

      resetBtn.disabled = true;
      const previous = resetBtn.innerHTML;
      resetBtn.innerHTML = 'Réinitialisation...';

      try {
        const res = await API.auth.resetPassword({ token, new_password: password });
        showInfo(res.message || 'Mot de passe réinitialisé avec succès.');
        setTimeout(() => { window.location.href = 'signin.html'; }, 2000);
      } catch (err) {
        showError(err.message || 'Impossible de réinitialiser le mot de passe.');
      } finally {
        resetBtn.disabled = false;
        resetBtn.innerHTML = previous;
      }
    });
  </script>
</body>
</html>
