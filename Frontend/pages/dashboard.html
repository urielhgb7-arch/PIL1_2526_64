<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFRI MentorLink - Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .swipe-card {
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: grab;
        }
        .swipe-card:active { cursor: grabbing; }
        .swiped-right { transform: translate(150vw, 100px) rotate(30deg) !important; opacity: 0; }
        .swiped-left { transform: translate(-150vw, 100px) rotate(-30deg) !important; opacity: 0; }
        
        /* Personnalisation de la scrollbar pour le style Telegram */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col md:flex-row-reverse font-sans select-none">

    <main class="flex-1 p-4 md:p-8 mb-24 md:mb-0 overflow-y-auto flex flex-col h-screen">
        
        <section id="dashboardSection" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">Mon Profil MentorLink</h2>
                <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-xl transition active:scale-95">✏️ Modifier mon profil</button>
            </div>

            <div id="dbAlertBanner" class="hidden text-sm p-4 rounded-xl border"></div>

            <div id="profileViewMode" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col items-center text-center justify-center space-y-4">
                    <div class="relative w-32 h-32 rounded-full overflow-hidden border-4 border-slate-900 shadow-xl bg-slate-900">
                        <img id="viewPhoto" src="https://ui-avatars.com/api/?name=User" alt="Photo" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h3 id="viewFullName" class="text-xl font-bold text-white">Chargement...</h3>
                        <p id="viewRole" class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mt-1">...</p>
                        <p id="viewContact" class="text-xs text-slate-400 mt-2">...</p>
                    </div>
                </div>

                <div class="md:col-span-2 space-y-6">
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <h4 class="text-xs font-bold text-slate-500 uppercase">Département / Filière</h4>
                            <p id="viewFiliere" class="text-sm text-slate-200 mt-1 font-medium">Chargement...</p>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-slate-500 uppercase">Niveau Académique</h4>
                            <p id="viewNiveau" class="text-sm text-slate-200 mt-1 font-medium">Chargement...</p>
                        </div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                        <h4 id="viewAptitudesTitle" class="text-xs font-bold text-slate-500 uppercase mb-3">Mes Aptitudes</h4>
                        <div id="viewSkillsContainer" class="flex flex-wrap gap-2"></div>
                    </div>
                </div>
            </div>

            <form id="profileEditForm" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex flex-col items-center text-center space-y-4">
                    <div class="relative w-32 h-32 rounded-full overflow-hidden border-4 border-slate-900 shadow-xl bg-slate-900">
                        <img id="editPhotoPreview" src="https://ui-avatars.com/api/?name=User" alt="Aperçu" class="w-full h-full object-cover">
                    </div>
                    <label class="w-full bg-slate-900 hover:bg-slate-950 text-slate-300 text-xs font-medium py-2.5 px-4 rounded-xl border border-slate-700 cursor-pointer transition text-center block">
                        📸 Choisir une photo
                        <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewAndUploadPhoto()">
                    </label>
                </div>
                <div class="md:col-span-2 bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Prénom</label>
                            <input type="text" id="editFirstname" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-200 text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Nom</label>
                            <input type="text" id="editLastname" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-200 text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Téléphone</label>
                            <input type="tel" id="editPhone" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-200 text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Filière</label>
                            <select id="editFiliere" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-300 text-sm outline-none">
                                <option value="GL">Génie Logiciel (GL)</option>
                                <option value="SI">Systèmes d'Information (SI)</option>
                                <option value="RIT">Réseaux et Télécoms (RIT)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1">Niveau</label>
                            <select id="editNiveau" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-slate-300 text-sm outline-none">
                                <option value="L1">Licence 1 (L1)</option>
                                <option value="L2">Licence 2 (L2)</option>
                                <option value="L3">Licence 3 (L3)</option>
                                <option value="M1">Master 1 (M1)</option>
                                <option value="M2">Master 2 (M2)</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 pt-4 border-t border-slate-700/50">
                        <button type="button" onclick="toggleEditMode()" class="px-4 py-2 text-xs font-semibold text-slate-400 hover:text-white transition">Annuler</button>
                        <button type="submit" id="saveProfileBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-5 py-2 rounded-xl transition">Enregistrer</button>
                    </div>
                </div>
            </form>
        </section>

        <section id="swipeSection" class="hidden max-w-md mx-auto mt-6 w-full">
            <div id="cardContainer" class="relative w-full h-[460px]">
                <div class="text-center pt-20 text-slate-500" id="noMoreProfiles">
                    <p>🔍 Recherche de profils compatibles...</p>
                </div>
            </div>
            <div class="hidden md:flex justify-center gap-6 mt-6">
                <button onclick="handleAction('decline')" class="bg-red-600/10 hover:bg-red-600 border border-red-500/30 text-red-400 hover:text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition">Décliner</button>
                <button onclick="handleAction('accept')" class="bg-blue-600/10 hover:bg-blue-600 border border-blue-500/30 text-blue-400 hover:text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition">Accepter</button>
            </div>
        </section>

        <section id="demandesSection" class="hidden space-y-6 w-full">
            <h2 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">Demandes d'intérêt reçues</h2>
            <div id="demandesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </section>

        <section id="messagesSection" class="hidden flex-1 flex flex-row bg-slate-950/50 rounded-2xl border border-slate-800 overflow-hidden h-full">
            <div class="w-full md:w-80 border-r border-slate-800 flex flex-col bg-slate-900/60">
                <div class="p-4 border-b border-slate-800">
                    <input type="text" placeholder="Rechercher un échange..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-sm outline-none text-slate-300 focus:ring-1 focus:ring-blue-500">
                </div>
                <div id="chatListContainer" class="flex-1 overflow-y-auto divide-y divide-slate-800/40">
                    </div>
            </div>

            <div id="chatWindow" class="hidden flex-1 md:flex flex-col bg-slate-900/20 relative">
                <div class="p-4 border-b border-slate-800 bg-slate-900/40 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img id="chatWinPhoto" class="w-10 h-10 rounded-full object-cover border border-slate-700">
                        <div>
                            <h4 id="chatWinName" class="text-sm font-bold text-white">...</h4>
                            <span class="text-[11px] text-emerald-400 font-medium">En ligne</span>
                        </div>
                    </div>
                </div>

                <div id="chatMessagesBox" class="flex-1 overflow-y-auto p-4 space-y-3 flex flex-col">
                    </div>

                <form id="chatInputForm" class="p-4 border-t border-slate-800 bg-slate-900/40 flex gap-3 items-center">
                    <input type="text" id="chatMessageInput" placeholder="Écrire un message..." autocomplete="off" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm outline-none text-slate-200 focus:border-slate-700">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-xl text-sm transition">
                        🕊️
                    </button>
                </form>
            </div>
            
            <div id="noChatSelected" class="hidden md:flex flex-1 flex-col items-center justify-center text-slate-500 gap-2">
                <span class="text-4xl">💬</span>
                <p class="text-sm">Sélectionnez une discussion pour commencer à échanger.</p>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-slate-800 border-t border-slate-700 flex justify-around p-3 md:relative md:w-64 md:h-screen md:border-t-0 md:border-r md:flex-col md:justify-start md:gap-4 md:p-6 z-50">
        <div class="hidden md:block mb-8"><span class="text-xl font-extrabold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">IFRI MentorLink</span></div>
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn flex flex-col md:flex-row items-center gap-1 md:gap-4 text-blue-400 md:w-full md:p-3 md:rounded-xl md:bg-slate-900/50 font-medium text-xs md:text-sm"><span>📊</span><span>Dashboard</span></button>
        <button onclick="switchTab('swipe')" id="nav-swipe" class="nav-btn flex flex-col md:flex-row items-center gap-1 md:gap-4 text-slate-400 md:w-full md:p-3 md:rounded-xl hover:bg-slate-700/30 text-xs md:text-sm"><span>❤️</span><span>Swipe</span></button>
        <button onclick="switchTab('demandes')" id="nav-demandes" class="nav-btn flex flex-col md:flex-row items-center gap-1 md:gap-4 text-slate-400 md:w-full md:p-3 md:rounded-xl hover:bg-slate-700/30 text-xs md:text-sm"><span>📄</span><span>Demandes</span></button>
        <button onclick="switchTab('messages')" id="nav-messages" class="nav-btn flex flex-col md:flex-row items-center gap-1 md:gap-4 text-slate-400 md:w-full md:p-3 md:rounded-xl hover:bg-slate-700/30 text-xs md:text-sm"><span>💬</span><span>Messages</span></button>
    </nav>

    <script src="dashboard.js"></script>
</body>
</html>
